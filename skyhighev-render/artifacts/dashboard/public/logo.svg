<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#1c0f3d"/>
      <stop offset="100%" stop-color="#080812"/>
    </radialGradient>
    <linearGradient id="hexStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0e6ff"/>
      <stop offset="50%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="innerHex" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(139,92,246,0.18)"/>
      <stop offset="100%" stop-color="rgba(56,189,248,0.06)"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="outerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="98" fill="url(#bg)"/>

  <!-- Subtle circuit lines in background -->
  <g stroke="rgba(139,92,246,0.12)" stroke-width="0.8" fill="none">
    <line x1="20" y1="60" x2="50" y2="60"/><line x1="50" y1="60" x2="60" y2="50"/>
    <line x1="180" y1="140" x2="150" y2="140"/><line x1="150" y1="140" x2="140" y2="150"/>
    <line x1="20" y1="140" x2="50" y2="140"/><line x1="50" y1="140" x2="60" y2="150"/>
    <line x1="180" y1="60" x2="150" y2="60"/><line x1="150" y1="60" x2="140" y2="50"/>
  </g>
  <g fill="rgba(139,92,246,0.25)">
    <circle cx="50" cy="60" r="1.5"/><circle cx="150" cy="60" r="1.5"/>
    <circle cx="50" cy="140" r="1.5"/><circle cx="150" cy="140" r="1.5"/>
  </g>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#hexStroke)" stroke-width="1.5" opacity="0.5"/>

  <!-- Main hexagon outer glow -->
  <polygon points="100,18 168,58 168,138 100,178 32,138 32,58"
    fill="none" stroke="rgba(139,92,246,0.3)" stroke-width="6" filter="url(#outerGlow)" opacity="0.6"/>

  <!-- Main hexagon -->
  <polygon points="100,20 166,60 166,136 100,176 34,136 34,60"
    fill="url(#innerHex)" stroke="url(#hexStroke)" stroke-width="2"/>

  <!-- Inner hexagon -->
  <polygon points="100,40 148,66 148,120 100,146 52,120 52,66"
    fill="rgba(139,92,246,0.06)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>

  <!-- Corner accent dots on hexagon vertices -->
  <g fill="url(#hexStroke)" filter="url(#softGlow)">
    <circle cx="100" cy="20" r="2.5"/>
    <circle cx="166" cy="60" r="2.5"/>
    <circle cx="166" cy="136" r="2.5"/>
    <circle cx="100" cy="176" r="2.5"/>
    <circle cx="34" cy="136" r="2.5"/>
    <circle cx="34" cy="60" r="2.5"/>
  </g>

  <!-- Lightning bolt — centered, bold, glowing -->
  <path d="M112,42 L82,103 L101,103 L88,158 L120,93 L100,93 Z"
    fill="url(#boltGrad)" filter="url(#glow)"/>

  <!-- Subtle scan line effect at bottom -->
  <line x1="60" y1="162" x2="140" y2="162" stroke="rgba(56,189,248,0.35)" stroke-width="0.8"/>
  <line x1="72" y1="166" x2="128" y2="166" stroke="rgba(139,92,246,0.25)" stroke-width="0.6"/>
</svg>
